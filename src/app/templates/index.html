<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Movie Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #090d16 0%, #111324 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <header class="max-w-5xl mx-auto mb-8 text-center pt-4">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-white">
            🍿 CinemaMatch AI
        </h1>
        <p class="text-slate-400 text-xs md:text-sm mt-1">Get custom suggestions based on your profile, movie tastes, or mood.</p>
    </header>

    <section class="max-w-5xl mx-auto mb-10">
        <div class="glass-card p-5 rounded-2xl shadow-xl grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">User Account Profile</label>
                <input type="number" id="userProfile" value="199" min="1" max="943" class="w-full bg-slate-900/80 border border-slate-700/60 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-white font-medium">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Choose a Category</label>
                <select id="genreSelect" class="w-full bg-slate-900/80 border border-slate-700/60 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-white font-medium">
                    <option value="All">All Categories</option>
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Animation">Animation</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Crime">Crime</option>
                    <option value="Drama">Drama</option>
                    <option value="Horror">Horror</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Based on a Movie You Love</label>
                <input type="text" id="favMovie" placeholder="Optional (e.g. Toy Story)" class="w-full bg-slate-900/80 border border-slate-700/60 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-white placeholder-slate-600">
            </div>

            <div>
                <button onclick="triggerDiscovery()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-2.5 px-4 rounded-xl transition duration-200 shadow-lg shadow-indigo-600/20 active:scale-[0.98]">
                    Generate Recommendations
                </button>
            </div>

        </div>
    </section>

    <main class="max-w-5xl mx-auto">
        <h3 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
            <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span>
            Your Curated Selections
        </h3>
        
        <div id="resultsLayout" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
            </div>
    </main>

    <script>
        async function triggerDiscovery() {
            const container = document.getElementById('resultsLayout');
            
            // Extract interface values cleanly
            const uid = document.getElementById('userProfile').value;
            const genre = document.getElementById('genreSelect').value;
            const fav = encodeURIComponent(document.getElementById('favMovie').value);

            // Construct dynamic routing query params
            const targetUrl = `/api/discover?user_id=${uid}&genre=${genre}&favorite_movie=${fav}`;
            
            container.innerHTML = `
                <div class="col-span-full text-center py-12 text-sm text-slate-500 tracking-wide font-medium animate-pulse">
                    Scanning neural catalogs...
                </div>
            `;

            try {
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error('Data transmission drop.');
                const movies = await response.json();

                container.innerHTML = '';

                if (!movies || movies.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12 text-sm text-slate-500 bg-slate-900/20 rounded-2xl border border-dashed border-slate-800">
                            No matching items identified in this subcategory sequence. Try adjusting fields.
                        </div>`;
                    return;
                }

                movies.forEach((movie) => {
                    const card = document.createElement('div');
                    card.className = 'glass-card p-5 rounded-2xl flex flex-col justify-between hover:border-slate-600/40 transition-all duration-200 hover:-translate-y-1 group';
                    
                    // Create dynamic badge labels matching categorical output listings
                    const badges = movie.genres.map(g => 
                        `<span class="text-[10px] bg-slate-800/80 text-slate-300 px-2 py-0.5 rounded border border-slate-700/40 font-medium">${g}</span>`
                    ).join(' ');

                    card.innerHTML = `
                        <div>
                            <div class="w-full aspect-[4/3] bg-gradient-to-br from-indigo-950/40 to-slate-900 rounded-xl mb-4 border border-slate-800/50 flex items-center justify-center group-hover:from-indigo-900/40 transition-colors">
                                <span class="text-2xl text-indigo-500/40 font-bold group-hover:text-indigo-400/60 transition-colors">🎬</span>
                            </div>
                            <h4 class="text-sm font-bold text-slate-100 group-hover:text-white transition-colors leading-tight mb-2">${movie.title}</h4>
                        </div>
                        <div class="flex flex-wrap gap-1 mt-2">
                            ${badges}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="col-span-full text-center py-12 text-sm text-rose-500 font-medium">Failed to retrieve data streams from calculation matrices. Check configuration.</div>`;
            }
        }

        // Initialize setup presentation values automatically on boot sequence
        window.onload = triggerDiscovery;
    </script>
</body>
</html>
